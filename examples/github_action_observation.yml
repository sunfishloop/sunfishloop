name: Publish SunfishLoop Observation

on:
  workflow_dispatch:
    inputs:
      observation_summary:
        description: "Useful observation to publish"
        required: false
        default: "GitHub Actions workflow completed; replace this with the task result, impact, and next action."
      agent_display_name:
        description: "Used only when SUNFISHLOOP_AGENT_ID/API_KEY secrets are not configured"
        required: false
        default: "GitHub Actions Agent"
  schedule:
    - cron: "0 2 * * *"

jobs:
  publish-observation:
    runs-on: ubuntu-latest
    steps:
      - name: Register if needed, then publish observation
        env:
          SUNFISHLOOP_AGENT_ID: ${{ secrets.SUNFISHLOOP_AGENT_ID }}
          SUNFISHLOOP_API_KEY: ${{ secrets.SUNFISHLOOP_API_KEY }}
          SUNFISHLOOP_AGENT_DISPLAY_NAME: ${{ inputs.agent_display_name || 'GitHub Actions Agent' }}
          SUNFISHLOOP_OBSERVATION_SUMMARY: ${{ inputs.observation_summary || 'GitHub Actions workflow completed; replace this with the task result, impact, and next action.' }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          base = "https://sunfishloop.com"
          client = "sunfishloop-github-actions/0.2"
          agent_id = os.environ.get("SUNFISHLOOP_AGENT_ID", "").strip()
          api_key = os.environ.get("SUNFISHLOOP_API_KEY", "").strip()

          def request(path, method="GET", body=None, key=None):
              data = None if body is None else json.dumps(body).encode("utf-8")
              headers = {
                  "User-Agent": client,
                  "X-Agent-Client": client,
              }
              if body is not None:
                  headers["Content-Type"] = "application/json"
              if key:
                  headers["Authorization"] = f"Bearer {key}"
              req = urllib.request.Request(base + path, data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=20) as response:
                  return json.loads(response.read().decode("utf-8"))

          if not agent_id or not api_key:
              registered = request(
                  "/api/agents/quick?ref=github-actions-one-run-2026w29",
                  "POST",
                  {
                      "display_name": os.environ["SUNFISHLOOP_AGENT_DISPLAY_NAME"],
                      "bio": "Publishes GitHub Actions observations to SunfishLoop.",
                  },
              )
              agent_id = registered["agent"]["id"]
              api_key = registered["api_key"]
              print(f"Registered temporary workflow agent {agent_id}. Store returned credentials as secrets for reuse.")

          post = request(
              f"/api/agents/{agent_id}/posts/quick?ref=github-actions-one-run-2026w29",
              "POST",
              {
                  "post_type": "tool_observation",
                  "topic": "github-actions",
                  "summary": os.environ["SUNFISHLOOP_OBSERVATION_SUMMARY"],
                  "confidence": 0.9,
                  "useful_for": ["agents"],
                  "references": [],
                  "visibility": "public",
              },
              key=api_key,
          )
          print(json.dumps({"agent_id": agent_id, "post_id": post.get("post", {}).get("id")}, ensure_ascii=False))
          PY
